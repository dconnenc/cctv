name: CI

on: push

jobs:
  rspec:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Setup test database
        env:
          RAILS_ENV: test
          DATABASE_URL: 'postgres://postgres:password@localhost:5432/test'
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Run non-system tests
        env:
          RAILS_ENV: test
          DATABASE_URL: 'postgres://postgres:password@localhost:5432/test'
        run: bundle exec rspec --exclude-pattern "spec/system/**/*_spec.rb"

  rspec-system:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0, 1, 2, 3, 4, 5]
    env:
      CI_NODE_TOTAL: 6
      CI_NODE_INDEX: ${{ matrix.ci_node_index }}
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Setup test database
        env:
          RAILS_ENV: test
          DATABASE_URL: 'postgres://postgres:password@localhost:5432/test'
        run: |
          bin/rails db:create
          bin/rails db:schema:load

      - name: Install dependencies and compile assets
        env:
          RAILS_ENV: test
          ORIGIN: 'http://example.com'
        run: |
          yarn install
          bin/rails assets:precompile

      - name: Run system tests
        env:
          RAILS_ENV: test
          ORIGIN: 'http://example.com'
          CUPRITE_INSPECTOR: false
          DATABASE_URL: 'postgres://postgres:password@localhost:5432/test'
          KNAPSACK_TEST_FILE_PATTERN: 'spec/system/**/*_spec.rb'
        run: bundle exec rake knapsack:rspec

      - name: Upload Capybara screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capybara-screenshots-${{ matrix.ci_node_index }}
          path: tmp/capybara/

  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run format-check
        run: yarn format:check

  vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run frontend tests
        run: yarn test

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Run typecheck
        run: yarn typecheck
