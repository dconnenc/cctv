default: &default
  adapter: postgresql
  encoding: unicode
  username: <%= ENV["DATABASE_USERNAME"] %>
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: <%= ENV.fetch("DATABASE_NAME", "cctv_development") %>

test:
  <<: *default
  database: <%= ENV.fetch("TEST_DATABASE_NAME", "cctv_test") %>

production:
  <<: *default
  database: cctv_production
  username: cctv
  password: <%= ENV["CCTV_DATABASE_PASSWORD"] %>
